<!DOCTYPE html>
<html>
<head>
  <title>My App</title>
</head>
<body>
  <button onclick="loadData()">โหลดข้อมูล</button>
  <div id="output"></div>

  <script>
    // 👇 วาง URL จาก Apps Script ตรงนี้
    const API_URL = "https://script.google.com/macros/s/AKfycbxKCoaQLcZqqzGSnX2_NK0bSaW-MurhGtEWz5baZdfYv9C5GsnGnRVV0-P7pfAZsL-l/exec";

    // ดึงข้อมูล (GET)
    async function loadData() {
      const res = await fetch(`${API_URL}?action=getData`);
      const json = await res.json();
      document.getElementById("output").innerText = JSON.stringify(json.data);
    }

    // บันทึกข้อมูล (POST)
    async function saveData() {
      const res = await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({
          action: "saveData",
          data: ["ชื่อ", "อีเมล", new Date().toISOString()]
        })
      });
      const json = await res.json();
      console.log(json);
    }
  </script>
</body>
</html>
